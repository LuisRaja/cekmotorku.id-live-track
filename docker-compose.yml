version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cekmotormu
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cekmotormu
      PORT: "3000"
      CORS_ORIGIN: "*"
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  pgdata:
